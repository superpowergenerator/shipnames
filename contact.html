<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Ship Name Generator</title>
  <meta name="description" content="Get in touch with questions, feedback, or ideas for the ship name generator. We'd love to hear from you." />
  <meta name="theme-color" content="#e0567f" />
  <link rel="canonical" href="https://shipnames.cc/contact.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact | Ship Name Generator" />
  <meta property="og:description" content="Questions, feedback, or ideas? Get in touch." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e0567f'%3E%3Cpath d='M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="contact">
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header" id="site-header"></header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <h1>Get in <span class="accent-text">Touch</span></h1>
        <p>Questions, feedback, or a feature idea? We'd love to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info">
            <div class="contact-info__item">
              <span class="icon" id="ciMail"></span>
              <div><h4>Email</h4><p><a href="mailto:hello@shipnames.cc">hello@shipnames.cc</a></p></div>
            </div>
            <div class="contact-info__item">
              <span class="icon" id="ciChat"></span>
              <div><h4>Social</h4><p>Find us @shipnames on your favorite platform.</p></div>
            </div>
            <div class="contact-info__item">
              <span class="icon" id="ciHeart"></span>
              <div><h4>Feedback</h4><p>Loved a blend? Tell us, it makes our day.</p></div>
            </div>
          </div>

          <form class="panel" id="contactForm" novalidate>
            <div class="form-success" id="contactSuccess">
              <span id="successIcon"></span>
              <span>Thanks! Your message has been noted.</span>
            </div>

            <div class="field">
              <label class="field__label" for="cName">Name</label>
              <input class="field__input" type="text" id="cName" name="name" placeholder="Your name" autocomplete="name" required />
            </div>
            <div class="field">
              <label class="field__label" for="cEmail">Email</label>
              <input class="field__input" type="email" id="cEmail" name="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="field">
              <label class="field__label" for="cMessage">Message</label>
              <textarea class="field__input" id="cMessage" name="message" placeholder="How can we help?" required></textarea>
            </div>
            <p class="form-error" id="contactError" role="alert" hidden></p>
            <button class="btn btn--primary btn--block btn--lg" type="submit">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer" data-year="2026"></footer>

  <script src="js/icons.js"></script>
  <script src="js/components.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
